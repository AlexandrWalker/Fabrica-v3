<div id="language" class="language popup" data-lenis-prevent>
  <div class="popup__wrap">
    <div class="popup__area" data-popup-head>
      <div class="popup__close">
        <i class="icon-close"></i>
      </div>
    </div>
    <div class="popup__inner">

      <div class="layout" data-popup-scroll>
        <div class="container">
          <div class="layout__inner">

            <div class="layout__head">
              <div class="layout__head-title">
                <h2>
                  Выберите язык меню
                </h2>
              </div>
            </div>
            <div class="layout__body">
              <div class="layout__block">
                <div class="layout__block-item">
                  <div class="layout__block-item--img">
                    <img src="./../../images/temp/flag-russia.svg" alt="">
                  </div>
                  <div class="layout__block-item--text">
                    Русский
                  </div>
                  <i class="icon-chevron-right"></i>
                </div>
                <div class="layout__block-item">
                  <div class="layout__block-item--img">
                    <img src="./../../images/temp/flag-china.svg" alt="">
                  </div>
                  <div class="layout__block-item--text">
                    中国人
                  </div>
                  <i class="icon-chevron-right"></i>
                </div>
                <div class="layout__block-item">
                  <div class="layout__block-item--img">
                    <img src="./../../images/temp/flag-english.svg" alt="">
                  </div>
                  <div class="layout__block-item--text">
                    English
                  </div>
                  <i class="icon-chevron-right"></i>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
